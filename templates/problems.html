<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | PyQuest</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/pyquest.css') }}">

</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<nav>
  <a href="/"><h1>PyQuest</h1></a>
  <div>
    <a href="/logout">Logout</a>
  </div>
</nav>
<section class="dashboard">
  <h2>Your Challenges</h2>
{% for p in problems %}

<div class="problem-card">
<p>{{p[0] }} : {{p[1] }} :
{{ p[2][:100] }}...
<a href="/problem/{{ p[0] }}">
<button class="btn primary">Solve</button>
</a>
</p>
</div>

{% endfor %}
</section>

<footer>
  © 2026 PyQuest — Cyber Learning Arcade
</footer>
</body>
</html>
