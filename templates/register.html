<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyQuest | Create Account</title>

  <!-- Main CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pyquest.css') }}">

  <!-- Toastr -->
  {{ toastr.include_jquery() }}
  {{ toastr.include_toastr_css() }}
</head>

<body>

<nav>
  <h1><a href="/">PyQuest</a></h1>
</nav>

<section class="auth-container">
  <div class="auth-box">

    <form id="registerForm" action="/register" method="POST">
      <h2>Create Account</h2>

      <div class="input-group">
        <label for="fullname">User Name</label>
        <input id="fullname" type="text" name="fullname" required>
      </div>

      <div class="input-group">
        <label for="email">Email</label>
    <input id="email" type="email" name="email" required>
    
      </div>

      <div class="input-group">
        <label for="role">Role</label>
        <select id="role" name="role" required>
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
        </select>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" required minlength="6">
      </div>

      <div class="input-group">
        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" type="password" name="confirm_password" required>
      </div>

      <button type="submit" class="btn primary" style="width:100%;">Register</button>

      <div class="toggle-text">
        Already have an account?
        <a href="{{ url_for('login') }}" style="color: rgb(139, 236, 27);">Login</a>
      </div>
    </form>

  </div>
</section>

<footer>
  © 2026 PyQuest — Cyber Learning Arcade
</footer>

<!-- Toastr JS -->
{{ toastr.include_toastr_js() }}
{{ toastr.message() }}

<!-- Real-Time Validation Script with Toastr -->
<script>
  const fullname = document.getElementById("fullname");
  const email = document.getElementById("email");
  const password = document.getElementById("password");
  const confirm = document.getElementById("confirm_password");

  function showError(message) {
    toastr.clear();
    toastr.error(message);
  }

  function showSuccess(message) {
    toastr.clear();
    toastr.success(message);
  }

  fullname.addEventListener("input", () => {
    if (fullname.value.trim().length < 2) {
      showError("Name must be at least 2 characters");
    }
  });

  email.addEventListener("input", () => {
    if (!email.value.includes("@")) {
      showError("Enter a valid email address");
    }
  });

  password.addEventListener("input", () => {
    if (password.value.length < 6) {
      showError("Password must be at least 6 characters");
    }
  });

  confirm.addEventListener("input", () => {
    if (confirm.value !== password.value) {
      showError("Passwords do not match");
    } else if (confirm.value.length > 0) {
      showSuccess("Passwords match");
    }
  });

  // Final submit validation
  document.getElementById("registerForm").addEventListener("submit", function(e) {
    toastr.clear();

    if (!fullname.value.trim()) {
      e.preventDefault();
      showError("User name is required");
      return;
    }

    if (!email.value.trim()) {
      e.preventDefault();
      showError("Email is required");
      return;
    }

    if (password.value.length < 6) {
      e.preventDefault();
      showError("Password must be at least 6 characters");
      return;
    }

    if (password.value !== confirm.value) {
      e.preventDefault();
      showError("Passwords do not match");
      return;
    }

    showSuccess("Registration submitted successfully!");
  });
  // Email availability check (AJAX)
  let emailTimer;

  email.addEventListener("input", () => {
    clearTimeout(emailTimer);

    emailTimer = setTimeout(() => {
      const value = email.value.trim();

      if (value.length === 0) return;

      fetch(`/check-email?email=${encodeURIComponent(value)}`)
        .then(res => res.json())
        .then(data => {
          toastr.clear();

          if (data.exists) {
            toastr.error("Email is already registered");
          } else {
            toastr.success("Email is available");
          }
        })
        .catch(() => {
          toastr.error("Error checking email");
        });
    }, 1000); // debounce delay
  });
</script>

</body>
</html>
