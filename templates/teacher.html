<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | PyQuest</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/pyquest.css') }}">

</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<nav>
  <a href="/"><h1>PyQuest</h1></a>
  <div>
        <a href="/logout">Logout</a>
  </div>
</nav>
{% set usr_name = session["user"].capitalize() %}
<section class="dashboard">
  <h2>Welcome {{ usr_name }}</h2>
    <p>Here's your Instructor dashboard. Manage Challenges and oversee the Analytics.</p>
  <div class="stats">
    <div class="card">
      <a href="{{ url_for('teacher_problems') }}" style="text-decoration: none;"><h3>⚡ Add new Challenge</h3></a>
    </div>

    <div class="card">
      <a href="{{ url_for('teacher_analytics') }}" style="text-decoration: none;"><h3>🏆 Analytics</h3></a>    
    </div>

    <div class="card">
     <a href="{{ url_for('manage_problems') }}" style="text-decoration: none;"><h3>🔥 Edit Problems</h3></a>    
    </div>
  </div>
</section>

<footer>
  © 2026 PyQuest — Cyber Learning Arcade
</footer>

</body>
</html>
