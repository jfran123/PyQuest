<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | PyQuest</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/pyquest.css') }}">

</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<nav>
  <h1>PyQuest</h1>
  <div>
    <a href="/">Home</a>
    <a href="/logout">Logout</a>
  </div>
</nav>

<section class="dashboard">
  <h2>Leaderboard</h2>

<table>

<tr>
<th>Rank</th>
<th>Name</th>
<th>Points</th>
</tr>

{% for u in users %}

<tr>
<td>{{ loop.index }}</td>
<td>{{ u[0] }}</td>
<td>{{ u[1] }}</td>
</tr>

{% endfor %}

</table>
</section>

<footer>
  © 2026 PyQuest — Cyber Learning Arcade
</footer>

</body>
</html>
