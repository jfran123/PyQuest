<!DOCTYPE html>
<html>
<head>
<title>Progress</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>My Coding Progress</h2>

<div>

<p>Total Problems Solved: <b>{{solved}}</b></p>

<p>Total Problems Available: <b>{{total_problems}}</b></p>

<p>Total Submissions: <b>{{total_submissions}}</b></p>

<p>Success Rate: <b>{{success_rate}}%</b></p>

</div>

<h3>Solved Problems</h3>

<ul>

{% for p in solved_list %}

<li>{{p[0]}}</li>

{% endfor %}

</ul>

<br>

<a href="/dashboard">Back to Dashboard</a>

</body>
</html>
